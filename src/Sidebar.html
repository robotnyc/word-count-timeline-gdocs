<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons1.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    #result {
      margin-top: 15px;
      font-weight: bold;
    }

    .branding-below {
      bottom: 56px;
      top: 0;
    }

    .branding-text {
      left: 7px;
      position: relative;
      top: 3px;
    }

    .col-contain {
      overflow: hidden;
    }

    .col-one {
      float: left;
      width: 50%;
    }

    .logo {
      vertical-align: middle;
    }

    .radio-spacer {
      height: 20px;
    }

    .width-100 {
      width: 100%;
    }

    .outline-list {
      list-style-type: none;
      padding-left: 16px;
      margin: 0;
      font-family: "Google Sans", Roboto, Helvetica, Arial, sans-serif;
    }

    .root-list {
      padding-left: 0;
    }

    .outline-item {
      padding: 6px 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      color: #3c4043;
      border-radius: 0 16px 16px 0;
      cursor: pointer;
      margin: 2px 0;
      border-left: 3px solid transparent;
    }

    .outline-item:hover {
      background-color: #f1f3f4;
    }

    .outline-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-grow: 1;
    }

    .outline-count {
      color: #5f6368;
      font-size: 12px;
      margin-left: 12px;
      white-space: nowrap;
    }

    .document-total {
      font-family: "Google Sans", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 500;
      color: #3c4043;
      margin-bottom: 12px;
      font-size: 13px;
      padding-left: 12px;
    }

    .progress-bar-container {
      width: 100%;
      background-color: #e8eaed;
      border-radius: 4px;
      height: 6px;
      margin-top: 4px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background-color: #1a73e8;
      border-radius: 4px;
    }
  </style>
  <script>
    var appData = {};

    function refreshOutline() {
      document.getElementById('outline-container').innerHTML = 'Loading...';
      var loaded = 0;

      function checkRender() {
        loaded++;
        if (loaded === 3) {
          render(appData);
        }
      }

      google.script.run.withSuccessHandler(function (count) {
        appData.wordCount = count;
        checkRender();
      }).getCurrentWordCount();

      google.script.run.withSuccessHandler(function (headings) {
        appData.headingWordCounts = headings;
        checkRender();
      }).getHeadingWordCounts();

      google.script.run.withSuccessHandler(function (goal) {
        appData.goal = goal;
        checkRender();
      }).getWordCountGoal();
    }

    function onLoad() {
      refreshOutline();
      pollRevisionWordCounts(3, -1);
    }

    function saveGoal(value) {
      var goal = value ? parseInt(value, 10) : null;
      appData.goal = goal;
      google.script.run.setWordCountGoal(goal);
      render(appData);
    }

    function escapeHtml(text) {
      if (!text) return '';
      var map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, function (m) { return map[m]; });
    }

    function buildOutlineHtml(node, isRoot, currentGoal) {
      if (!node) return '';

      var html = '';
      if (!isRoot) {
        html += '<div class="outline-item" style="flex-wrap: wrap;">';
        html += '<div style="display: flex; width: 100%; align-items: center;">';
        html += '<span class="outline-title" title="' + escapeHtml(node.title) + '">' + escapeHtml(node.title) + '</span>';
        html += '<span class="outline-count">' + node.wordCount + ' words</span>';
        html += '</div>';

        if (currentGoal) {
          var pct = Math.min(100, Math.round((node.wordCount / currentGoal) * 100));
          html += '<div class="progress-bar-container" title="Goal: ' + Math.round(currentGoal) + '"><div class="progress-bar" style="width: ' + pct + '%"></div></div>';
        }

        html += '</div>';
      }

      if (node.subheadings && node.subheadings.length > 0) {
        var childGoal = currentGoal ? (currentGoal / node.subheadings.length) : null;
        html += '<ul class="outline-list' + (isRoot ? ' root-list' : '') + '">';
        for (var i = 0; i < node.subheadings.length; i++) {
          html += '<li>' + buildOutlineHtml(node.subheadings[i], false, childGoal) + '</li>';
        }
        html += '</ul>';
      }
      return html;
    }

    function render(data) {
      var goalHtml = '<div class="document-total" style="display: flex; align-items: center; justify-content: space-between;">' +
                     '<span>Goal: <input type="number" id="goal-input" value="' + (data.goal || '') + '" onchange="saveGoal(this.value)" style="width: 80px;" title="Set total word count goal" /></span>' +
                     '</div>';

      var outlineHtml = goalHtml + '<div class="document-total">Total: ' + data.wordCount + ' words</div>';

      if (data.goal) {
         var pct = Math.min(100, Math.round((data.wordCount / data.goal) * 100));
         outlineHtml += '<div class="progress-bar-container" style="margin: 0 12px 12px 12px; width: auto;" title="Goal: ' + Math.round(data.goal) + '"><div class="progress-bar" style="width: '+pct+'%"></div></div>';
      }

      if (data.headingWordCounts) {
        outlineHtml += buildOutlineHtml(data.headingWordCounts, true, data.goal);
      }
      var outlineContainer = document.getElementById('outline-container');
      if (outlineContainer) {
        outlineContainer.innerHTML = outlineHtml;
      }
    }

    function fetchWordCount() {
      document.getElementById('result').innerText = 'Loading...';
      google.script.run
        .withSuccessHandler(function (count) {
          document.getElementById('result').innerText = 'Word count: ' + count;
        })
        .getCurrentWordCount();
    }

    let timelineChart = null;

    function renderTimelineChart(data) {
      document.getElementById('result').innerHTML = '<canvas id="timelineChart"></canvas>';
      var ctx = document.getElementById('timelineChart').getContext('2d');

      var labels = data.map(function (item) {
        var d = new Date(item.date);
        return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
      });
      var counts = data.map(function (item) {
        return item.wordCount;
      });

      if (timelineChart) {
        timelineChart.destroy();
      }

      timelineChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Word Count',
            data: counts,
            borderColor: '#1a73e8',
            backgroundColor: 'rgba(26, 115, 232, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.1,
            pointRadius: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: 'Words'
              }
            },
            x: {
              ticks: {
                maxTicksLimit: 5
              }
            }
          }
        }
      });
    }

    function pollRevisionWordCounts(attemptsLeft, previousCount) {
      if (!document.getElementById('result').innerHTML.includes('canvas')) {
        document.getElementById('result').innerText = 'Loading...';
      }
      google.script.run
        .withSuccessHandler(function (data) {
          renderTimelineChart(data);
          refreshTrends();

          if (data.length !== previousCount && attemptsLeft > 1) {
            setTimeout(function () {
              pollRevisionWordCounts(attemptsLeft - 1, data.length);
            }, 30000);
          }
        })
        .fetchRevisionWordCounts();
    }

    function fetchRevisionWordCounts() {
      pollRevisionWordCounts(1, -1);
    }

    function refreshTrends() {
      var trendsDiv = document.getElementById('result-trends');
      trendsDiv.innerText = 'Loading...';
      google.script.run
        .withSuccessHandler(function (data) {
          if (!data || data.length < 2) {
            trendsDiv.innerText = 'Not enough data to calculate trends.';
            return;
          }

          var first = data[0];
          var last = data[data.length - 1];
          var netWords = last.wordCount - first.wordCount;

          var msPerDay = 1000 * 60 * 60 * 24;
          var days = (new Date(last.date) - new Date(first.date)) / msPerDay;

          if (days < 1) {
            days = 1;
          }

          var perDay = Math.round(netWords / days);
          var perWeek = Math.round(perDay * 7);
          var perMonth = Math.round(perDay * 30.44);

          var html = '<ul class="outline-list root-list">';
          html += '<li class="outline-item"><span class="outline-title">Average per Day</span><span class="outline-count">' + perDay + ' words</span></li>';
          html += '<li class="outline-item"><span class="outline-title">Average per Week</span><span class="outline-count">' + perWeek + ' words</span></li>';
          html += '<li class="outline-item"><span class="outline-title">Average per Month</span><span class="outline-count">' + perMonth + ' words</span></li>';

          if (appData.goal && appData.wordCount !== undefined) {
            var remaining = appData.goal - appData.wordCount;
            if (remaining > 0) {
              if (perDay > 0) {
                var daysLeft = Math.ceil(remaining / perDay);
                html += '<li class="outline-item"><span class="outline-title">Goal ETA</span><span class="outline-count">' + daysLeft + ' days</span></li>';
              } else {
                html += '<li class="outline-item"><span class="outline-title">Goal ETA</span><span class="outline-count">N/A</span></li>';
              }
            } else {
              html += '<li class="outline-item"><span class="outline-title">Goal ETA</span><span class="outline-count">Reached!</span></li>';
            }
          }

          html += '</ul>';

          trendsDiv.innerHTML = html;
        })
        .fetchRevisionWordCounts(true);
    }

    function fetchHeadingWordCounts() {
      document.getElementById('result').innerText = 'Loading...';
      google.script.run
        .withSuccessHandler(function (data) {
          document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        })
        .getHeadingWordCounts();
    }

  </script>
</head>

<body onload="onLoad()">
  <div class="sidebar branding-below">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <h1>Document</h1>
      <button class="action" onclick="refreshOutline()" title="Refresh word counts" style="margin-right: 12px;">Refresh</button>
    </div>
    <div id="outline-container">Loading...</div>

    <div class="block">
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <h1>Timeline</h1>
        <button class="action" onclick="fetchRevisionWordCounts()" title="Refresh timeline" style="margin-right: 12px;">Refresh</button>
      </div>
      <div class="block" id="result"></div>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between;">
      <h1>Trend</h1>
      <button class="action" onclick="refreshTrends()" title="Refresh trends" style="margin-right: 12px;">Refresh</button>
    </div>
    <div class="block" id="result-trends"></div>
  </div>
</body>

</html>
